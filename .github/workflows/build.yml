name: Build & Package

# 在 push/PR 到主分支、打 v* tag、以及手动触发时运行。
# 产出可下载的 .vsix 产物；打 tag 时还会发布到 VS Code Marketplace（需要 PAT）。
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18.x', '20.x']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # 用官方 @vscode/vsce 而非已废弃的全局 vsce，避免 undici/node18 兼容问题
        run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        # 强制使用官方打包器，输出到 release/
        run: npx --yes @vscode/vsce package --out ./release/ --no-git-tag-version --allow-duplicate-tag

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: glm-plan-usage-vsix-node${{ matrix.node }}
          path: release/*.vsix
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish to Marketplace
    # 仅在打 v* tag 时发布，且需要配置 VSCE_PAT secret
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run compile

      - name: Publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --no-git-tag-version
