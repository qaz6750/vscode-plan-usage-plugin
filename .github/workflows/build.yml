name: Build & Package

# 在 push/PR 到主分支、打 v* tag、以及手动触发时运行。
# 产出可下载的 .vsix 产物；打 tag 时还会上传到 GitHub Release（不发布到 VS Code Marketplace）。
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # @vscode/vsce 依赖 undici@7，要求 node >=20.18.1，故不再测试 Node 18
        node: ['20.x']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # 用官方 @vscode/vsce 而非已废弃的全局 vsce，避免 undici/node18 兼容问题
        run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        # 强制使用官方打包器，输出到 release/
        # 注：--allow-duplicate-tag 仅用于 publish，package 不支持该选项
        run: npx --yes @vscode/vsce package --out ./release/ --no-git-tag-version

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: glm-plan-usage-vsix-node${{ matrix.node }}
          path: release/*.vsix
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish to GitHub Release
    # 仅在打 v* tag 时发布到 GitHub Release（不再发布到 VS Code Marketplace）
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # softprops/action-gh-release 需要写权限来创建 Release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --out ./release/ --no-git-tag-version

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 把打包好的 .vsix 作为资产附加到当前 tag 的 Release
          files: release/*.vsix
          generate_release_notes: true
          # 如果同名 Release 已存在则覆盖资产，避免重复 tag 报错
          fail_on_unmatched_files: true
